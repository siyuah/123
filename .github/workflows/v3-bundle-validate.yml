name: V3 Bundle Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-v3-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install validation dependencies
        run: python -m pip install pyyaml pytest
      - name: Run validator tests
        run: python -m pytest tests/test_validate_v3_bundle.py -q
      - name: Validate V3 bundle
        run: make validate-v3
