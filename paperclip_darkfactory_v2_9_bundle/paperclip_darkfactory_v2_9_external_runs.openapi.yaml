openapi: 3.1.0
info:
  title: Paperclip × Dark Factory V2.9 External Runs API
  version: 2.9-impl.1
  description: Starter OpenAPI contract bound to v2.9-companion-bound-r1.
servers:
  - url: https://example.invalid
paths:
  /api/external-runs:
    post:
      summary: Create an external run
      operationId: createExternalRun
      description: |
        Supports Idempotency-Key.
        Replays with the same Idempotency-Key and semantically identical payload MUST return the same result.
        Reuse of the same Idempotency-Key with a different payload MUST return a conflict response.
      parameters:
        - $ref: '#/components/parameters/ProtocolReleaseTagHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExternalRunCreateRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalRunView'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/external-runs/{runId}:
    get:
      summary: Get external run
      operationId: getExternalRun
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Current run view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalRunView'
  /api/external-runs/{runId}:park:
    post:
      summary: Park a run into manual mode and release compute resources
      operationId: parkExternalRun
      description: |
        Supports Idempotency-Key.
        Replays with the same Idempotency-Key and semantically identical payload MUST return the same result.
        Reuse of the same Idempotency-Key with a different payload MUST return a conflict response.
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ProtocolReleaseTagHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ParkRequest'
      responses:
        '202':
          description: Run parked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalRunView'
  /api/external-runs/{runId}:rehydrate:
    post:
      summary: Rehydrate a parked run
      operationId: rehydrateExternalRun
      description: |
        Supports Idempotency-Key.
        Replays with the same Idempotency-Key and semantically identical payload MUST return the same result.
        Reuse of the same Idempotency-Key with a different payload MUST return a conflict response.
        A given rehydrateTokenRef MAY succeed at most once.
        Reuse after successful consumption MUST return a conflict or idempotent replay of the original outcome.
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ProtocolReleaseTagHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RehydrateRequest'
      responses:
        '202':
          description: Run rehydrated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalRunView'
  /api/artifacts/{artifactId}:
    get:
      summary: Get artifact certification and lineage summary
      operationId: getArtifact
      parameters:
        - in: path
          name: artifactId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Artifact view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactView'
  /api/artifacts/{artifactId}:waive-consumption:
    post:
      summary: Create a consumption waiver
      operationId: createConsumptionWaiver
      description: |
        Supports Idempotency-Key.
        Replays with the same Idempotency-Key and semantically identical payload MUST return the same result.
        Reuse of the same Idempotency-Key with a different payload MUST return a conflict response.
      parameters:
        - in: path
          name: artifactId
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/ProtocolReleaseTagHeader'
        - $ref: '#/components/parameters/TraceIdHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsumptionWaiverRequest'
      responses:
        '202':
          description: Waiver accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactView'
  /api/lineage/artifacts/{artifactId}:
    get:
      summary: Query lineage consumers of an artifact
      operationId: getArtifactLineage
      parameters:
        - in: path
          name: artifactId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lineage view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LineageView'
components:
  parameters:
    ProtocolReleaseTagHeader:
      in: header
      name: X-Protocol-Release-Tag
      required: true
      schema:
        type: string
        enum: [v2.9-companion-bound-r1]
    TraceIdHeader:
      in: header
      name: X-Trace-Id
      required: false
      schema:
        type: string
    IdempotencyKeyHeader:
      in: header
      name: Idempotency-Key
      required: false
      schema:
        type: string
  schemas:
    RunState:
      type: string
      enum:
        - requested
        - validating
        - planning
        - executing
        - waiting_input
        - waiting_approval
        - parked_manual
        - blocked
        - finalizing
        - completed
        - failed
        - cancelled
    ReasonCode:
      type: string
      enum:
        - approval_required
        - execution_starts
        - manual_gate_triggered
        - operator_sla_timeout
        - rehydrate_approved
        - runtime_audit_coverage_insufficient
        - capability_observation_exceeded_declared
        - broker_bypass_attempted_detected
        - revoked_upstream_waiver_cannot_allow_primary_write
        - capsule_poisoned_retry_blocked
        - schema_write_fence_violation
    ExternalRunCreateRequest:
      type: object
      required:
        - taskId
        - workflowId
        - policyProfileId
        - protocolReleaseTag
      properties:
        taskId:
          type: string
        workflowId:
          type: string
        policyProfileId:
          type: string
        protocolReleaseTag:
          type: string
          enum: [v2.9-companion-bound-r1]
        deadlineSensitive:
          type: boolean
        requestedCapabilities:
          type: array
          items:
            type: string
        providerModelId:
          type: string
        capsuleHash:
          type: string
        metadata:
          type: object
          additionalProperties: true
    ExternalRunView:
      type: object
      required:
        - runId
        - runState
        - protocolReleaseTag
      properties:
        runId:
          type: string
        runState:
          $ref: '#/components/schemas/RunState'
        attemptId:
          type: string
        manualGateType:
          type: string
          enum:
            - manual_approval_required
            - manual_evidence_access_required
            - manual_adjudication_required
            - manual_risk_acceptance_required
            - manual_recovery_required
            - manual_external_followup_required
        capsuleHealth:
          type: string
          enum: [healthy, preflight_red, poisoned]
        profileConformanceStatus:
          type: string
          enum: [conformant, exceeded_declared, broker_bypass_attempted, unverifiable]
        deadlineSensitive:
          type: boolean
        protocolReleaseTag:
          type: string
          enum: [v2.9-companion-bound-r1]
        traceId:
          type: string
        artifactIds:
          type: array
          items:
            type: string
    ParkRequest:
      type: object
      required:
        - manualGateType
        - reasonCode
        - requestedBy
        - protocolReleaseTag
      properties:
        manualGateType:
          type: string
          enum:
            - manual_approval_required
            - manual_evidence_access_required
            - manual_adjudication_required
            - manual_risk_acceptance_required
            - manual_recovery_required
            - manual_external_followup_required
        reasonCode:
          $ref: '#/components/schemas/ReasonCode'
        requestedBy:
          type: string
        protocolReleaseTag:
          type: string
          enum: [v2.9-companion-bound-r1]
        preserveEvidenceRefs:
          type: array
          items:
            type: string
        truthObligationRef:
          type: string
        resourceReleaseEvidenceRef:
          type: string
    RehydrateRequest:
      type: object
      required:
        - rehydrateTokenRef
        - requestedBy
        - reasonCode
        - protocolReleaseTag
      properties:
        rehydrateTokenRef:
          type: string
        requestedBy:
          type: string
        reasonCode:
          $ref: '#/components/schemas/ReasonCode'
        protocolReleaseTag:
          type: string
          enum: [v2.9-companion-bound-r1]
        notes:
          type: string
        expectedManualGateResolved:
          type: boolean
    ArtifactView:
      type: object
      required:
        - artifactId
        - artifactCertificationState
        - protocolReleaseTag
      properties:
        artifactId:
          type: string
        artifactCertificationState:
          type: string
          enum: [tentative, certified, reopened, revoked, quarantined, superseded]
        protocolReleaseTag:
          type: string
          enum: [v2.9-companion-bound-r1]
        revocationEpoch:
          type: integer
          minimum: 0
        traceId:
          type: string
        lineageParentArtifactIds:
          type: array
          items:
            type: string
        impactedConsumerRunIds:
          type: array
          items:
            type: string
    ConsumptionWaiverRequest:
      type: object
      required:
        - allowedConsumerScope
        - allowedConsumptionPolicy
        - allowedEffectSafetyCeiling
        - maxFanOut
        - reasonCode
        - protocolReleaseTag
      properties:
        allowedConsumerScope:
          type: string
        allowedConsumptionPolicy:
          type: string
          enum: [tentative_allowed_with_waiver, tentative_allowed_internal]
        allowedEffectSafetyCeiling:
          type: string
        maxFanOut:
          type: integer
          minimum: 1
        expiresAt:
          type: string
          format: date-time
        reasonCode:
          $ref: '#/components/schemas/ReasonCode'
        protocolReleaseTag:
          type: string
          enum: [v2.9-companion-bound-r1]
    LineageView:
      type: object
      required:
        - artifactId
        - consumers
        - protocolReleaseTag
      properties:
        artifactId:
          type: string
        protocolReleaseTag:
          type: string
          enum: [v2.9-companion-bound-r1]
        traceId:
          type: string
        consumers:
          type: array
          items:
            type: object
            required: [consumerRunId, inputDependencyState, dependencyConsumptionPolicy]
            properties:
              consumerRunId:
                type: string
              inputDependencyState:
                type: string
                enum: [clean, tentative_upstream, reopened_upstream, revoked_upstream, manually_waived]
              dependencyConsumptionPolicy:
                type: string
                enum: [certified_only, tentative_allowed_internal, tentative_allowed_with_waiver]
    ErrorResponse:
      type: object
      required:
        - code
        - message
        - protocolReleaseTag
        - retryable
      properties:
        code:
          type: string
          enum:
            - invalid_protocol_release_tag
            - run_not_found
            - attempt_not_parkable
            - rehydration_requirements_not_met
            - manual_gate_not_satisfied
            - waiver_scope_invalid
            - waiver_fanout_exceeded
            - artifact_not_consumable
            - capsule_preflight_failed
            - capsule_poisoned_retry_blocked
            - profile_conformance_unverifiable
            - schema_write_fence_rejected
        message:
          type: string
        protocolReleaseTag:
          type: string
          enum: [v2.9-companion-bound-r1]
        traceId:
          type: string
        retryable:
          type: boolean
        operatorAction:
          type: string
        details:
          type: object
          additionalProperties: true
