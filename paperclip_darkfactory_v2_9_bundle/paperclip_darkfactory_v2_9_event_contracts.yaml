protocolReleaseTag: v2.9-companion-bound-r1
normativeVersion: "2.9"
companionAppendixVersion: "2.9-companion.1"
implPackVersion: "2.9-impl.1"
envelope:
  required:
    - eventName
    - eventVersion
    - eventId
    - emittedAt
    - protocolReleaseTag
    - traceId
    - producer
    - causationId
    - correlationId
    - sequenceNo
    - isReplay
  properties:
    eventName: string
    eventVersion: string
    eventId: string
    emittedAt: date-time
    protocolReleaseTag: string
    traceId: string
    producer: string
    causationId: string
    correlationId: string
    sequenceNo: integer
    isReplay: boolean
    partitionKey: string
    orderingScope: string
    idempotencyKey: string
    runId: string
    attemptId: string
    artifactId: string
events:
  - name: run.lifecycle.changed
    canonicalName: run.lifecycle.changed
    legacyAliases:
      - run_state_changed
    version: v2
    partitionKey: runId
    orderingScope: runId
    idempotencyKey: eventId
    replaySafe: true
    requiredPayload:
      - runId
      - runState
      - actor
      - reasonCode
  - name: capability.observed
    canonicalName: capability.observed
    legacyAliases: []
    version: v1
    partitionKey: executorSessionId
    orderingScope: executorSessionId
    idempotencyKey: executionCapabilityLeaseId+eventVersion
    replaySafe: true
    requiredPayload:
      - executorSessionId
      - executionCapabilityLeaseId
      - declaredCapabilitySet
      - grantedCapabilitySet
      - observedCapabilitySet
      - profileConformanceStatus
  - name: artifact.certification.changed
    canonicalName: artifact.certification.changed
    legacyAliases:
      - artifact_certification_changed
    version: v1
    partitionKey: artifactId
    orderingScope: artifactId
    idempotencyKey: artifactId+revocationEpoch+newState
    replaySafe: true
    requiredPayload:
      - artifactId
      - oldState
      - newState
      - revocationEpoch
      - triggeringEvidenceRef
  - name: lineage.invalidation.started
    canonicalName: lineage.invalidation.started
    legacyAliases:
      - lineage_invalidation_started
    version: v1
    partitionKey: artifactId
    orderingScope: artifactId
    idempotencyKey: artifactId+revocationEpoch
    replaySafe: true
    requiredPayload:
      - artifactId
      - oldCertificationState
      - newCertificationState
      - revocationEpoch
      - impactedConsumerCount
  - name: lineage.invalidation.propagated
    canonicalName: lineage.invalidation.propagated
    legacyAliases: []
    version: v1
    partitionKey: consumerRunId
    orderingScope: consumerRunId
    idempotencyKey: artifactId+consumerRunId+inputDependencyState
    replaySafe: true
    requiredPayload:
      - artifactId
      - consumerRunId
      - inputDependencyState
      - blockNewHighRiskWrites
  - name: capsule.preflight.failed
    canonicalName: capsule.preflight.failed
    legacyAliases: []
    version: v1
    partitionKey: runId
    orderingScope: runId
    idempotencyKey: runId+capsuleHash+providerModelId
    replaySafe: true
    requiredPayload:
      - runId
      - capsuleHash
      - providerModelId
      - failureReason
      - capsuleHealth
  - name: manual_gate.parked
    canonicalName: manual_gate.parked
    legacyAliases:
      - manual_gate_changed
    version: v1
    partitionKey: runId
    orderingScope: runId
    idempotencyKey: eventId
    replaySafe: true
    requiredPayload:
      - runId
      - attemptId
      - manualGateType
      - parkedAt
      - parkReasonCode
      - rehydrateTokenRef
      - executionSuspensionState
  - name: manual_gate.rehydrated
    canonicalName: manual_gate.rehydrated
    legacyAliases: []
    version: v1
    partitionKey: runId
    orderingScope: runId
    idempotencyKey: rehydrateTokenRef
    replaySafe: true
    requiredPayload:
      - runId
      - previousAttemptId
      - newAttemptId
      - rehydratedAt
      - rehydrateTokenRef
  - name: schema.write_fence.rejected
    canonicalName: schema.write_fence.rejected
    legacyAliases: []
    version: v1
    partitionKey: objectType
    orderingScope: objectType
    idempotencyKey: objectType+objectId+writerSchemaVersion
    replaySafe: true
    requiredPayload:
      - objectType
      - objectId
      - writerSchemaVersion
      - minWriterSchemaVersion
      - rejectedBy
