services:
  dark-factory:
    build:
      context: .
    image: dark-factory-v3-http:local
    environment:
      DF_API_KEY_FILE: /run/secrets/df_api_key
      DF_PORT: "9701"
    secrets:
      - df_api_key
    volumes:
      - dark_factory_data:/data
      - ./backups:/backups
    command: ["./start_server.sh", "--host", "0.0.0.0", "--journal", "/data/dark_factory_v3.jsonl"]
    expose:
      - "9701"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9701/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2.8-alpine
    depends_on:
      dark-factory:
        condition: service_healthy
    ports:
      - "9702:9702"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

secrets:
  df_api_key:
    file: ./secrets/df_api_key.txt

volumes:
  dark_factory_data:
  caddy_data:
  caddy_config:
